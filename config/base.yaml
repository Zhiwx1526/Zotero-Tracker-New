zotero:
  user_id: ???
  api_key: ???
  include_path: null
  ignore_path: null

source:
  arxiv:
    enabled: true
    category: null
    include_cross_list: false
    # API 查询最多返回条数（按 submittedDate 排序）；debug 时仍会截断为 10
    max_results: 2000
  biorxiv:
    enabled: false
    # 最近 N 天的预印本（基于服务器公开的日期语义；默认 2 天）
    days: 2
    max_results: 200
    timeout_seconds: 60
    num_retries: 3
    retry_backoff_seconds: 2
  medrxiv:
    enabled: false
    days: 2
    max_results: 200
    timeout_seconds: 60
    num_retries: 3
    retry_backoff_seconds: 2
  openalex:
    enabled: false
    query: null
    search_title_only: false
    # 均为 null 时按 lookback_days（UTC）自动设 from/to；若两项都写明则改用固定日期
    lookback_days: 3
    from_publication_date: null
    to_publication_date: null
    per_page: 50
    max_results: 200
    mailto: null

email:
  sender: ???
  receiver: ???
  smtp_server: ???
  smtp_port: ???
  sender_password: ???

llm:
  api:
    key: ???
    base_url: ???
  generation_kwargs:
    max_tokens: 4096
    model: ???
  # 与 custom 中 LLM_LANGUAGE 一致；也可写 简体中文（纯 YAML 无插值时中文合法）
  language: zh

reranker:
  api:
    key: null
    base_url: null
    model: null
    batch_size: 64
    cache:
      enabled: true
      dir: cache
      text_format_version: title_abstract_v1

keywords:
  top_k: 20
  max_features: 5000
  ngram_max: 2

executor:
  debug: false
  send_empty: false
  # continue: 单来源失败时跳过并继续；fail_fast: 任一来源失败立即中断
  source_error_policy: continue
  max_paper_num: 100
  source: ["arxiv"]
  reranker: api
  retriever_sleep_seconds: 1
