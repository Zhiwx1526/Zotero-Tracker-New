zotero:
  user_id: ???
  api_key: ???
  include_path: null
  ignore_path: null

source:
  arxiv:
    enabled: true
    category: null
    include_cross_list: false
    # 最近 N 天（UTC 自然日，含今天）
    days: 2
    # API 查询最多返回条数（按 submittedDate 排序）；debug 时仍会截断为 10
    max_results: 2000
  biorxiv:
    enabled: false
    # 最近 N 天的预印本（基于服务器公开的日期语义；默认 2 天）
    days: 2
    max_results: 200
    timeout_seconds: 60
    num_retries: 3
    retry_backoff_seconds: 2
  medrxiv:
    enabled: false
    days: 2
    max_results: 200
    timeout_seconds: 60
    num_retries: 3
    retry_backoff_seconds: 2
  openalex:
    enabled: false
    query: null
    search_title_only: false
    # 均为 null 时按 days（UTC）自动设 from/to；若两项都写明则改用固定日期
    days: 3
    from_publication_date: null
    to_publication_date: null
    per_page: 50
    max_results: 200
    mailto: null

email:
  sender: ???
  receiver: ???
  smtp_server: ???
  smtp_port: ???
  sender_password: ???

llm:
  api:
    key: ???
    base_url: ???
  generation_kwargs:
    max_tokens: 4096
    model: ???
  # 与 custom 中 LLM_LANGUAGE 一致；也可写 简体中文（纯 YAML 无插值时中文合法）
  language: zh
  # 逐篇自然语言「推荐解读」（额外 API 调用；默认关闭以免费用倍增）
  natural_explain:
    enabled: false
    # null 表示对邮件中的全部候选篇生成；设为正整数则仅前 N 篇
    max_papers: null
  # 邮件开头「今日简报」（每封额外 1 次调用；默认关闭）
  briefing:
    enabled: false
    # 写入简报 prompt 的最大篇数（标题+一句话摘要）
    max_papers: 15

reranker:
  api:
    key: null
    base_url: null
    model: null
    batch_size: 64
    cache:
      enabled: true
      dir: cache
      text_format_version: title_abstract_v1

keywords:
  top_k: 20
  max_features: 5000
  ngram_max: 2

executor:
  debug: false
  send_empty: false
  # 分级去重（DOI + 标题/摘要指纹）；默认关闭以保持与旧版行为一致
  dedupe:
    enabled: false
    merge_within_run: true
    filter_against_library: true
    min_abstract_len: 80
    allow_title_only: false
    allow_abstract_only: false
    min_title_len_weak: 24
    source_preference: [openalex, arxiv, biorxiv, medrxiv]
  # continue: 单来源失败时跳过并继续；fail_fast: 任一来源失败立即中断
  source_error_policy: continue
  # 相似度相关分数阈值（score）。null 表示不启用阈值过滤
  min_score: null
  max_paper_num: 100
  source: ["arxiv"]
  reranker: api
  retriever_sleep_seconds: 1
  # 每篇论文邮件中的「为什么推荐」：书库分解条数与标题展示长度
  explain_enabled: true     
  explain_top_k: 2     # 为什么推荐 条数
  explain_title_max_len: 80
  quality_ranking:
    enabled: false
    # redistribute: 指标缺失时将权重按可用指标重分配；zero_fill: 缺失按 0 处理
    fallback_policy: redistribute
    weights:
      relevance: 0.7
      citation: 0.15
      journal: 0.1
      authority: 0.05

quality_data:
  # Scimago 映射文件（CSV，示例列：journal_name,sjr,quartile）
  scimago_map_path: null
  sjr_log_cap: 10.0
  source_authority:
    openalex: 1.0
    arxiv: 0.75
    biorxiv: 0.65
    medrxiv: 0.65

feedback:
  enabled: false
  base_url: ${oc.env:FEEDBACK_BASE_URL,http://127.0.0.1:8787}
  secret: ${oc.env:FEEDBACK_SECRET,change-me}
  ttl_seconds: 604800
  prefetch_guard: basic
  store_path: data/feedback.sqlite
  user_id_salt: ${oc.env:FEEDBACK_USER_ID_SALT,zotero-tracker}
  lookback_days: 90
  weights:
    item_pos: 1.2
    item_neg: 1.6
    tag_pos: 0.35
    tag_neg: 0.55
  decay_tau_days: 30
