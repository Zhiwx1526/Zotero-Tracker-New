zotero:
  user_id: ${oc.env:ZOTERO_ID,???}
  api_key: ${oc.env:ZOTERO_KEY,???}
email:
  sender: ${oc.env:SENDER,???}
  receiver: ${oc.env:RECEIVER_EMAIL,???}
  smtp_server: ${oc.env:SMTP_SERVER,smtp.qq.com}
  smtp_port: ${oc.env:SMTP_PORT,465}
  sender_password: ${oc.env:SENDER_PASSWORD,???}
llm:
  api:
    key: ${oc.env:OPENAI_API_KEY,???}
    base_url: ${oc.env:OPENAI_API_BASE,???}
  generation_kwargs:
    model: ${oc.env:LLM_MODEL,???}
  language: ${oc.env:LLM_LANGUAGE,zh}
  natural_explain:
    enabled: true
    max_papers: 3
  briefing:
    enabled: true
    max_papers: 5
reranker:
  api:
    batch_size: 10
    key: ${oc.env:EMBEDDING_API_KEY,${oc.env:OPENAI_API_KEY,null}}
    base_url: ${oc.env:EMBEDDING_API_BASE,${oc.env:OPENAI_API_BASE,https://dashscope.aliyuncs.com/compatible-mode/v1}}
    model: ${oc.env:EMBEDDING_MODEL,text-embedding-v3}
source:
  arxiv:
    enabled: true
    category:
    - cs.AI
    - cs.CV
    - cs.LG
    - cs.CL
    days: 3
    max_results: 100
  biorxiv:
    enabled: true
    days: 2
    max_results: 100
    timeout_seconds: 120
    num_retries: 3
    retry_backoff_seconds: 2
  medrxiv:
    enabled: true
    days: 2
    max_results: 100
    timeout_seconds: 120
    num_retries: 3
    retry_backoff_seconds: 2
  openalex:
    enabled: false
    query: null
    search_title_only: false
    days: 15
    from_publication_date: null
    to_publication_date: null
    per_page: 50
    max_results: 100
    mailto: ${oc.env:OPENALEX_MAILTO,null}
executor:
  explain_enabled: true
  debug: ${oc.env:DEBUG,false}
  min_score: 3.7
  source_error_policy: continue
  quality_ranking:
    enabled: true
    fallback_policy: redistribute
    weights:
      relevance: 0.65
      citation: 0.2
      journal: 0.1
      authority: 0.05
  source:
  - arxiv
  - biorxiv
  - medrxiv
quality_data:
  scimago_map_path: null
  sjr_log_cap: 10.0
  source_authority:
    openalex: 1.0
    arxiv: 0.75
    biorxiv: 0.65
    medrxiv: 0.65
feedback:
  enabled: true
